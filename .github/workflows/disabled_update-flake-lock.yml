name: "Flake.lock: update Nix dependencies"
on:
  workflow_dispatch: # allows manual triggering
  schedule:
    - cron: '0 0 * * 0' # runs weekly on Sunday at 00:00
jobs:
  nix-flake-update:
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    runs-on: nix
    steps:
      - uses: actions/checkout@v6
      - name: Update flake.lock and open PR
        if: ${{ github.event_name != 'pull_request' }}
        env:
          GITEA_TOKEN: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          GITEA_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          BRANCH: update_flake_lock_action
          BASE: main
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin "$BASE"
          git checkout -B "$BRANCH" origin/"$BASE"
          nix flake update --option access-tokens "github.com=$GITHUB_TOKEN"
          git add flake.lock
          if git diff --cached --quiet; then
            echo "flake.lock is already up to date, nothing to do."
            exit 0
          fi
          git commit -m "flake.lock: Update Nix inputs"
          git push origin "$BRANCH" --force
          OPEN=$(curl -s \
            -H "Authorization: token $GITEA_TOKEN" \
            "$GITEA_URL/api/v1/repos/$REPO/pulls?state=open&limit=50" \
            | jq "[.[] | select(.head.ref == \"$BRANCH\")] | length")
          if [ "$OPEN" = "0" ]; then
            curl -s -o /dev/null -X POST "$GITEA_URL/api/v1/repos/$REPO/pulls" \
              -H "Authorization: token $GITEA_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"title\":\"Update Nix flake inputs\",\"head\":\"$BRANCH\",\"base\":\"$BASE\"}"
            echo "Pull request created."
          else
            echo "Pull request already open, branch updated."
          fi
